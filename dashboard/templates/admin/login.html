{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedar Admin — Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #050A06;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(42,122,59,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-box {
            background: #111F13;
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(201,168,76,0.08);
            padding: 40px 36px 32px;
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            display: block;
            width: 110px;
            height: auto;
            margin: 0 auto 12px auto;
        }

        .login-title {
            text-align: center;
            color: #B8AD95;
            font-size: 10px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #B8AD95;
            font-size: 11px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        .form-group input {
            width: 100%;
            background: #0D1610;
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 8px;
            color: #F0E8D0;
            padding: 11px 14px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            border-color: rgba(201,168,76,0.5);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #C9A84C, #A8782A);
            border: none;
            border-radius: 8px;
            color: #050A06;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.8px;
            padding: 12px 24px;
            cursor: pointer;
            margin-top: 20px;
            transition: box-shadow 0.2s, transform 0.2s;
            font-family: inherit;
        }

        .submit-btn:hover {
            box-shadow: 0 4px 20px rgba(201,168,76,0.35);
            transform: translateY(-1px);
        }

        .errornote {
            color: #D96B6B;
            background: rgba(155,32,32,0.08);
            border: 1px solid rgba(155,32,32,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .errornote ul { padding-left: 16px; margin-top: 4px; }

        .password-reset {
            text-align: center;
            margin-top: 16px;
        }

        .password-reset a {
            color: rgba(201,168,76,0.6);
            font-size: 12px;
            text-decoration: none;
        }

        .password-reset a:hover {
            color: #C9A84C;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="{% static 'cedar-logo.png' %}" alt="Cedar Chatbot" class="login-logo">
        <p class="login-title">Admin Portal</p>

        {% if form.errors %}
        <div class="errornote">
            {% trans "Please enter the correct username and password." %}
        </div>
        {% endif %}

        <form method="post" action="{% url 'admin:login' %}{% if next %}?next={{ next }}{% endif %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">{% trans "Username" %}</label>
                <input type="text" id="id_username" name="username"
                       value="{{ form.username.value|default:'' }}"
                       autofocus autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="id_password">{% trans "Password" %}</label>
                <input type="password" id="id_password" name="password"
                       autocomplete="current-password" required>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="submit-btn">{% trans "Log in" %}</button>
        </form>
    </div>
</body>
</html>
