<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — Cedar Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --text:#e4e4e7; --dim:#9ca3af; --accent:#10b981; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,sans-serif; background:var(--bg); color:var(--text); }
        .header { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 2rem; }
        .header a { color:var(--accent); text-decoration:none; margin-right:1rem; }
        .container { max-width:1200px; margin:0 auto; padding:2rem; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(350px,1fr)); gap:1.5rem; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; }
        .card h3 { font-size:0.95rem; color:var(--dim); margin-bottom:1rem; }
        canvas { max-height:250px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="{% url 'dashboard' %}">← Dashboard</a>
        <strong>📊 Analytics</strong>
    </div>
    <div class="container">
        <div class="grid">
            <div class="card">
                <h3>Language Distribution</h3>
                <canvas id="langChart"></canvas>
            </div>
            <div class="card">
                <h3>Intent Classification</h3>
                <canvas id="intentChart"></canvas>
            </div>
            <div class="card">
                <h3>Sentiment Analysis</h3>
                <canvas id="sentimentChart"></canvas>
            </div>
            <div class="card">
                <h3>Daily Messages</h3>
                <canvas id="dailyChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const chartColors = ['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ec4899'];
        const chartOptions = {
            responsive: true,
            plugins: { legend: { labels: { color: '#9ca3af', font: { size: 11 } } } }
        };

        const langData = {{ language_dist|safe }};
        new Chart(document.getElementById('langChart'), {
            type: 'doughnut',
            data: {
                labels: langData.map(d => d.detected_language),
                datasets: [{ data: langData.map(d => d.count), backgroundColor: chartColors }]
            },
            options: chartOptions
        });

        const intentData = {{ intent_dist|safe }};
        new Chart(document.getElementById('intentChart'), {
            type: 'bar',
            data: {
                labels: intentData.map(d => d.intent),
                datasets: [{ data: intentData.map(d => d.count), backgroundColor: chartColors, borderRadius: 6 }]
            },
            options: { ...chartOptions, scales: { y: { ticks: { color: '#9ca3af' } }, x: { ticks: { color: '#9ca3af' } } } }
        });

        const sentData = {{ sentiment_dist|safe }};
        new Chart(document.getElementById('sentimentChart'), {
            type: 'doughnut',
            data: {
                labels: sentData.map(d => d.sentiment_label),
                datasets: [{ data: sentData.map(d => d.count), backgroundColor: ['#10b981','#9ca3af','#ef4444'] }]
            },
            options: chartOptions
        });

        const dailyData = {{ daily_metrics|safe }};
        if (dailyData && dailyData.length > 0) {
            new Chart(document.getElementById('dailyChart'), {
                type: 'line',
                data: {
                    labels: dailyData.map(d => d.date),
                    datasets: [{
                        label: 'Messages',
                        data: dailyData.map(d => d.total_messages),
                        borderColor: '#10b981',
                        tension: 0.3,
                        fill: false
                    }]
                },
                options: { ...chartOptions, scales: { y: { ticks: { color: '#9ca3af' } }, x: { ticks: { color: '#9ca3af' } } } }
            });
        }
    </script>
</body>
</html>
